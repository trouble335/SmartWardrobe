server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: smart-wardrobe-server

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:smart_wardrobe}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DB:0}
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.smartwardrobe.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    multiple-result-sets-enabled: true
    use-column-label: true
    use-generated-keys: true
    default-executor-type: simple
    default-statement-timeout: 25000
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: ${JWT_SECRET:smartWardrobeSecretKey2024ForJwtTokenGeneration}
  expiration: ${JWT_EXPIRATION:7200000}
  header: Authorization
  prefix: Bearer

# 微信配置
wechat:
  appid: ${WECHAT_APPID:}
  secret: ${WECHAT_SECRET:}

# 和风天气配置
qweather:
  key: ${QWEATHER_KEY:}
  base-url: https://devapi.qweather.com/v7

# 百度OCR配置
baidu:
  ocr:
    app-id: ${BAIDU_OCR_APP_ID:}
    api-key: ${BAIDU_OCR_API_KEY:}
    secret-key: ${BAIDU_OCR_SECRET_KEY:}

# Remove.bg配置
removebg:
  api-key: ${REMOVEBG_API_KEY:}
  base-url: https://api.remove.bg/v1.0

# 阿里云OSS配置
aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${OSS_BUCKET_NAME:}
    domain: ${OSS_DOMAIN:}

# 日志配置
logging:
  level:
    com.smartwardrobe: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 应用配置
app:
  # 图片处理配置
  image:
    max-size: 10485760  # 10MB
    allowed-types: image/jpeg,image/png,image/webp
  # 推荐配置
  recommend:
    default-count: 3
    max-count: 5
  # 沉睡单品阈值（天）
  sleeping:
    threshold-days: 90
